<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>マーダーミステリー エントリー</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    .sr-only {
      position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
      overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0;
    }

    :root {
      --bg:       #ffffff;
      --surface:  #ffffff;
      --surface2: #f7f8f6;
      --border:   #e3e6e1;
      --border-strong: #cdd2c9;
      --accent:   #3f6b50;
      --accent-dark: #345a43;
      --accent-soft: #eef3ee;
      --text:     #1f2a23;
      --muted:    #5c6660;
      --green:    #3f6b50;
      --red:      #b03d2e;
      --radius:   10px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans JP', 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
      font-size: 14px;
      line-height: 1.7;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(160deg, #1f3a2a 0%, #2d5240 50%, #1a3023 100%);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      padding: 3rem 1.5rem 2.5rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    /* 装飾ライン（上下） */
    header::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, transparent, #a8c8a0, #d4b483, #a8c8a0, transparent);
    }
    header::after {
      content: '';
      position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 80px; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(168,200,160,0.6), transparent);
    }
    /* 背景の繊細な模様 */
    .header-pattern {
      position: absolute; inset: 0; pointer-events: none; opacity: 0.04;
      background-image: repeating-linear-gradient(
        45deg, #fff 0px, #fff 1px, transparent 1px, transparent 12px
      );
    }

    .header-eyebrow {
      font-size: 0.65rem; letter-spacing: 0.5em; color: #b8d4b0;
      text-transform: uppercase; margin-bottom: 1rem; font-weight: 600;
      position: relative;
      display: flex; align-items: center; justify-content: center; gap: 0.75rem;
    }
    .header-eyebrow::before, .header-eyebrow::after {
      content: ''; display: inline-block;
      width: 30px; height: 1px; background: rgba(184,212,176,0.5);
    }

    header h1 {
      font-size: clamp(1.7rem, 5vw, 2.6rem); color: #f0ede8;
      letter-spacing: 0.12em; margin-bottom: 0.6rem; font-weight: 700;
      position: relative;
      text-shadow: 0 2px 12px rgba(0,0,0,0.3);
    }
    header h1 span { color: #c8dfc0; }

    /* サブタイトル：#b0bfb3 on #243d2d ≈ 4.6:1 でAA達成 */
    .header-subtitle {
      font-size: 0.8rem; color: #b0bfb3;
      letter-spacing: 0.05em; position: relative;
    }

    .header-divider {
      margin: 1.2rem auto 1rem;
      width: 40px; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(184,212,176,0.7), transparent);
      position: relative;
    }
    .header-divider::before {
      content: '✦';
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      font-size: 0.5rem; color: #b8d4b0; background: #2d5240;
      padding: 0 0.3rem; line-height: 1;
    }

    /* パスワード表示：#9eb5a6 on #243d2d ≈ 4.5:1 でAA達成 */
    .header-pass {
      margin-top: 1rem; display: inline-block;
      font-size: 0.72rem; color: #9eb5a6;
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px; padding: 0.3rem 1rem; position: relative;
    }
    .header-pass code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      color: #c8dfc0; font-weight: 700; letter-spacing: 0.05em;
      user-select: all;
    }

    .header-admin-area {
      position: absolute; top: 1rem; right: 1.1rem;
      display: flex; align-items: center; gap: 0.5rem;
    }
    /* 管理者ログイン中バッジ：#c8dfc0 on #1a3023 ≈ 7:1 でAAA達成 */
    .header-admin-status {
      font-size: 0.7rem; color: #c8dfc0; font-weight: 700;
      background: rgba(255,255,255,0.08); border: 1px solid rgba(200,223,192,0.4);
      border-radius: 20px; padding: 0.25rem 0.75rem; white-space: nowrap;
    }
    /* 管理者ボタン：#f0ede8 on #2d5240 ≈ 7.5:1 でAAA達成 */
    .header-admin-btn {
      background: transparent !important;
      border: 1px solid #c8dfc0 !important;
      color: #f0ede8 !important;
    }
    .header-admin-btn:hover {
      background: rgba(200,223,192,0.15) !important;
      border-color: #f0ede8 !important;
      color: #f0ede8 !important;
    }
    .header-admin-btn:focus-visible {
      outline: 2px solid #c8dfc0 !important;
      outline-offset: 2px;
    }

    /* ── 同期インジケーター ── */
    .sync-bar {
      border-bottom: 1px solid var(--border);
      padding: 0.3rem 1rem; text-align: center;
      font-size: 0.72rem; color: var(--accent-dark);
      display: flex; align-items: center; justify-content: center; gap: 0.4rem;
      background: var(--accent-soft);
    }
    .sync-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--accent); display: inline-block;
      animation: pulse 2s infinite;
    }
    .sync-bar.offline { background: #fff3f3; border-color: #f5c6c6; color: var(--red); }
    .sync-bar.offline .sync-dot { background: var(--red); animation: none; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

    /* ── Main ── */
    main { max-width: 700px; margin: 0 auto; padding: 2rem 1rem 5rem; }

    /* ── Filter bar ── */
    .filter-bar {
      display: flex; flex-wrap: wrap; gap: 0.5rem;
      margin-bottom: 2rem; padding-bottom: 1.25rem;
      border-bottom: 1px solid var(--border);
    }
    .filter-chip {
      background: var(--bg); border: 1px solid var(--border-strong);
      color: var(--text); font-family: inherit; font-size: 0.78rem;
      padding: 0.4rem 0.95rem; border-radius: 20px; cursor: pointer;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }
    .filter-chip:hover { border-color: var(--accent); color: var(--accent); }
    .filter-chip:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
    .filter-chip.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 500; }
    .filter-count { font-size: 0.72rem; margin-left: 0.3rem; opacity: 0.85; }
    .no-result { color: var(--muted); font-size: 0.85rem; text-align: center; padding: 2rem 0; }

    .filter-section { display: flex; align-items: center; flex-wrap: wrap; gap: 0.5rem; width: 100%; }
    .filter-section + .filter-section {
      padding-top: 0.65rem; margin-top: 0.15rem;
      border-top: 1px dashed var(--border);
    }
    .filter-section-label {
      font-size: 0.68rem; color: var(--muted); font-weight: 700;
      letter-spacing: 0.06em; white-space: nowrap; min-width: 2.8rem;
    }

    /* ── Category group ── */
    .category-group { margin-bottom: 2.5rem; }
    .category-heading { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1rem; }
    .category-heading-label {
      font-size: 0.8rem; letter-spacing: 0.08em; color: var(--text); font-weight: 700;
      white-space: nowrap; padding-left: 0.6rem; border-left: 3px solid var(--accent);
    }
    .category-heading-line { flex: 1; height: 1px; background: var(--border); }

    /* ── Work card ── */
    .works { display: flex; flex-direction: column; gap: 1rem; }

    .work {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden;
      box-shadow: 0 1px 2px rgba(31,42,35,0.04);
      transition: border-color 0.15s, box-shadow 0.15s, opacity 0.15s;
    }
    .work:hover { box-shadow: 0 4px 14px rgba(31,42,35,0.07); }
    .work:focus-within { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-soft); }
    .work.dragging { opacity: 0.4; }
    .work.drag-over { border-color: var(--accent); border-style: dashed; box-shadow: 0 0 0 2px var(--accent-soft); }

    /* ── 管理テーブル ドラッグ並び替え ── */
    .admin-drag-handle {
      display: inline-flex; align-items: center; justify-content: center;
      width: 1.6rem; height: 1.6rem; border-radius: 4px;
      color: var(--muted); cursor: grab; flex-shrink: 0;
      transition: color 0.15s, background 0.15s;
    }
    .admin-drag-handle:hover { color: #fff; background: var(--accent); }
    .admin-drag-handle:active { cursor: grabbing; }
    .admin-table tr.dragging { opacity: 0.4; }
    .admin-table tr.drag-over { outline: 2px dashed var(--accent); outline-offset: -2px; }

    .work-header {
      padding: 0.9rem 1.25rem 0.75rem 0.75rem; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between; gap: 0.5rem;
    }
    .work-header-left { display: flex; align-items: center; gap: 0.25rem; flex: 1; min-width: 0; }
    .work-title { font-weight: 700; font-size: 1rem; color: var(--text); }
    .work-badge {
      flex-shrink: 0; background: var(--accent-soft); border: 1px solid transparent;
      border-radius: 20px; font-size: 0.7rem; padding: 0.15rem 0.65rem;
      color: var(--accent-dark); white-space: nowrap;
    }

    /* サムネイル */
    .work-thumbnail { width: 100%; overflow: hidden; border-bottom: 1px solid var(--border); background: var(--surface2); }
    .work-thumbnail img { width: 100%; height: 180px; object-fit: cover; display: block; }

    /* 作品URL */
    .work-url-link {
      display: inline-flex; align-items: center; gap: 0.25rem;
      font-size: 0.73rem; color: var(--accent); font-weight: 600;
      text-decoration: none; padding: 0.15rem 0;
      border-bottom: 1px solid transparent;
      transition: border-color 0.15s, color 0.15s;
    }
    .work-url-link:hover { color: var(--accent-dark); border-bottom-color: var(--accent-dark); }

    .work-info {
      display: flex; flex-wrap: wrap; align-items: center; gap: 0.5rem;
      padding: 0.6rem 1.25rem; border-bottom: 1px solid var(--border); background: var(--surface2);
    }
    .info-item { display: inline-flex; align-items: center; gap: 0.3rem; font-size: 0.75rem; color: var(--muted); white-space: nowrap; flex-shrink: 0; }
    .info-item svg { flex-shrink: 0; color: var(--accent); opacity: 0.9; }
    .info-sep { color: var(--border-strong); font-size: 0.7rem; flex-shrink: 0; }

    .work-tags {
      display: flex; flex-wrap: wrap; gap: 0.35rem;
      padding: 0.55rem 1.25rem; border-bottom: 1px solid var(--border);
    }
    .tag {
      background: var(--bg); border: 1px solid var(--border-strong);
      color: var(--muted); font-size: 0.68rem; padding: 0.1rem 0.55rem; border-radius: 4px;
    }
    .work-tags:empty { display: none; }

    .work-bottom { padding: 0.9rem 1.25rem; }
    .entries-label { font-size: 0.7rem; color: var(--muted); letter-spacing: 0.05em; margin-bottom: 0.45rem; }
    .entry-list { display: flex; flex-wrap: wrap; gap: 0.4rem; min-height: 1.8rem; margin-bottom: 0.8rem; }
    .entry-chip {
      display: inline-flex; align-items: center; gap: 0.35rem;
      background: var(--accent-soft); border: 1px solid transparent;
      color: var(--accent-dark); font-size: 0.73rem;
      padding: 0.18rem 0.4rem 0.18rem 0.65rem; border-radius: 20px;
    }
    .chip-remove {
      display: inline-flex; align-items: center; justify-content: center;
      width: 1.05rem; height: 1.05rem; border-radius: 50%;
      border: none; cursor: pointer; padding: 0; line-height: 1;
      font-size: 0.85rem; font-family: inherit;
      background: rgba(63,107,80,0.15); color: var(--accent-dark);
      transition: background 0.15s, color 0.15s;
    }
    .chip-remove:hover { background: var(--red); color: #fff; }
    .chip-remove:focus-visible { outline: 2px solid var(--accent-dark); outline-offset: 1px; }
    .entry-empty { font-size: 0.73rem; color: var(--muted); align-self: center; }

    .work-badge-full { background: var(--red) !important; color: #fff !important; border-color: var(--red) !important; font-weight: 700; }
    /* 満員カード */
    .work.is-full { border-left: 3px solid var(--red); }
    .work.is-full .work-header { background: rgba(176,61,46,0.04); }
    .admin-card.is-full { border-left: 3px solid var(--red); }
    .admin-card.is-full .admin-card-header { background: rgba(176,61,46,0.06); }

    /* ── ステータス ── */
    .status-badge {
      flex-shrink: 0; border-radius: 20px; font-size: 0.7rem;
      padding: 0.15rem 0.65rem; font-weight: 700; white-space: nowrap;
    }
    .status-confirmed { background: var(--accent); color: #fff; }
    .status-done      { background: var(--muted);  color: #fff; }

    /* 開催確定：日時・場所バー */
    .work-schedule {
      display: flex; flex-wrap: wrap; gap: 0.35rem 0.8rem;
      padding: 0.5rem 1.25rem; border-bottom: 1px solid var(--border);
      background: var(--accent-soft); font-size: 0.78rem; color: var(--accent-dark); font-weight: 500;
    }
    .work-schedule-item { display: inline-flex; align-items: center; gap: 0.3rem; white-space: nowrap; flex-shrink: 0; }

    /* 開催済みカードはグレーアウト */
    .work.is-done { opacity: 0.6; }
    .admin-card.is-done .admin-card-header { background: var(--surface2); }
    .admin-card.is-done { opacity: 0.72; }

    /* 開催済みトグル */
    .archived-toggle-btn {
      background: none; border: 1px solid var(--border-strong); border-radius: 20px;
      padding: 0.35rem 0.9rem; font-size: 0.75rem; color: var(--muted);
      cursor: pointer; font-family: inherit; transition: all 0.15s;
      display: inline-flex; align-items: center; gap: 0.35rem;
    }
    .archived-toggle-btn.active { background: var(--muted); color: #fff; border-color: var(--muted); }
    .archived-toggle-btn:hover:not(.active) { border-color: var(--text); color: var(--text); }
    .archived-toggle-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
    .full-notice {
      font-size: 0.78rem; color: var(--muted);
      background: var(--surface2); border: 1px dashed var(--border-strong);
      border-radius: var(--radius); padding: 0.6rem 0.8rem; text-align: center;
    }
    .field-hint { font-size: 0.68rem; color: var(--muted); white-space: nowrap; }

    .entry-form { display: flex; gap: 0.5rem; align-items: stretch; }
    .entry-form .btn { flex-shrink: 0; white-space: nowrap; }
    .entry-input {
      flex: 1 1 auto; min-width: 0; background: var(--bg);
      border: 1px solid var(--border-strong); border-radius: var(--radius);
      padding: 0.5rem 0.75rem; font-size: 16px; font-family: inherit;
      color: var(--text); outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .entry-input::placeholder { color: var(--muted); }
    .entry-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      border: none; border-radius: var(--radius);
      padding: 0.5rem 1rem; font-size: 0.82rem;
      cursor: pointer; font-family: inherit; font-weight: 700;
      text-align: center; line-height: 1;
      transition: background 0.15s, filter 0.15s;
    }
    .btn:focus-visible { outline: 2px solid var(--accent-dark); outline-offset: 2px; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-dark); }

    .btn-xs {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 0.25rem 0.65rem; font-size: 0.72rem; border-radius: 4px;
      cursor: pointer; font-family: inherit; font-weight: 600;
      border: 1px solid; text-align: center; line-height: 1;
      transition: filter 0.15s, background 0.2s, border-color 0.2s;
    }
    .btn-xs:hover { filter: brightness(0.93); }
    .btn-xs:focus-visible { outline: 2px solid var(--accent-dark); outline-offset: 1px; }
    .btn-del   { background: #fff; color: var(--red);    border-color: var(--red); }
    .btn-save  { background: var(--accent); color: #fff;  border-color: var(--accent); }
    .btn-muted { background: #fff; color: var(--muted); border-color: var(--border-strong); }
    .btn-save.dirty { background: #b86510; border-color: #b86510; }

    .msg { font-size: 0.73rem; margin-top: 0.4rem; min-height: 1rem; }
    .msg-ok  { color: var(--green); }
    .msg-err { color: var(--red); }

    /* ── Admin ── */
    .admin-toggle {
      background: var(--bg); border: 1px solid var(--border-strong); border-radius: var(--radius);
      padding: 0.45rem 1.1rem; font-size: 0.78rem; cursor: pointer;
      color: var(--muted); font-family: inherit; transition: border-color 0.15s, color 0.15s;
    }
    .admin-toggle:hover { border-color: var(--accent); color: var(--accent); }
    .admin-toggle:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

    .admin-panel { display: none; background: var(--surface2); border-bottom: 1px solid var(--border); }
    .admin-panel.open { display: block; }
    .admin-panel-inner { max-width: 700px; margin: 0 auto; padding: 1.5rem 1rem; }

    .admin-login { display: flex; gap: 0.5rem; align-items: center; margin-bottom: 0.75rem; }
    .admin-login input {
      background: var(--bg); border: 1px solid var(--border-strong);
      border-radius: var(--radius); padding: 0.45rem 0.75rem;
      font-size: 0.82rem; font-family: inherit; color: var(--text); outline: none;
    }
    .admin-login input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
    .pass-field { position: relative; display: flex; align-items: center; }
    .pass-field input { padding-right: 3.2rem; }
    .pass-toggle {
      position: absolute; right: 0.4rem; border: none; background: none;
      color: var(--accent); font-family: inherit; font-size: 0.72rem;
      cursor: pointer; padding: 0.2rem 0.4rem; border-radius: 4px;
    }
    .pass-toggle:hover { text-decoration: underline; }
    .pass-toggle:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }
    .admin-err { color: var(--red); font-size: 0.78rem; margin-bottom: 0.5rem; }

    .admin-section { margin-bottom: 2rem; }
    .admin-section-title {
      font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 0.75rem;
      padding-bottom: 0.4rem; border-bottom: 1px solid var(--border);
    }

    .cat-list { display: flex; flex-direction: column; gap: 0.4rem; margin-bottom: 0.75rem; }
    .cat-row  { display: flex; gap: 0.4rem; align-items: center; }
    .add-cat-row { display: flex; gap: 0.4rem; }

    .a-input {
      background: var(--bg); border: 1px solid var(--border-strong);
      border-radius: 4px; padding: 0.35rem 0.6rem;
      font-size: 0.82rem; font-family: inherit; color: var(--text); outline: none;
    }
    .a-input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-soft); }
    .a-input.fill { flex: 1; }

    select.a-select {
      background: var(--bg); border: 1px solid var(--border-strong);
      border-radius: 4px; padding: 0.3rem 0.5rem;
      font-size: 0.78rem; font-family: inherit; color: var(--text);
      outline: none; cursor: pointer;
    }
    select.a-select:focus { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-soft); }

    .admin-table {
      width: 100%; border-collapse: collapse; font-size: 0.8rem;
      background: var(--surface); border-radius: var(--radius);
      overflow: hidden; border: 1px solid var(--border);
    }
    .admin-table th, .admin-table td {
      border: 1px solid var(--border); padding: 0.6rem 0.85rem;
      text-align: left; vertical-align: top;
    }
    .admin-table th {
      background: var(--surface2); color: var(--muted);
      font-size: 0.72rem; letter-spacing: 0.05em; text-transform: uppercase;
    }

    .field-row { display: flex; align-items: center; gap: 0.4rem; margin-bottom: 0.45rem; }
    .field-row:last-child { margin-bottom: 0; }
    .field-label { font-size: 0.7rem; color: var(--muted); white-space: nowrap; min-width: 2.5rem; }

    .admin-name-row { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.3rem; }

    .count-badge {
      display: inline-block;
      background: var(--accent-soft); border: 1px solid transparent;
      color: var(--accent-dark); border-radius: 20px; padding: 0.1rem 0.55rem; font-size: 0.72rem;
    }

    .reset-btn {
      margin-top: 1rem; background: #fff; border: 1px solid var(--border-strong);
      border-radius: var(--radius); padding: 0.4rem 0.9rem; font-size: 0.75rem;
      cursor: pointer; color: var(--muted); font-family: inherit;
      transition: border-color 0.15s, color 0.15s;
    }
    .reset-btn:hover { border-color: var(--red); color: var(--red); }
    .reset-btn:focus-visible { outline: 2px solid var(--red); outline-offset: 2px; }

    /* ── Admin status tabs ── */
    .admin-tabs {
      display: flex; gap: 0; border-bottom: 2px solid var(--border);
      margin-bottom: 1.25rem; overflow-x: auto;
    }
    .admin-tab {
      background: none; border: none; border-bottom: 2px solid transparent;
      margin-bottom: -2px; padding: 0.55rem 1.1rem;
      font-family: inherit; font-size: 0.82rem; font-weight: 600;
      color: var(--muted); cursor: pointer; white-space: nowrap;
      transition: color 0.15s, border-color 0.15s;
    }
    .admin-tab:hover { color: var(--text); }
    .admin-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .admin-tab:focus-visible { outline: 2px solid var(--accent); outline-offset: -2px; }
    .admin-tab-count {
      display: inline-block; font-size: 0.68rem; font-weight: 700;
      background: var(--border); color: var(--muted);
      border-radius: 20px; padding: 0.05rem 0.45rem; margin-left: 0.3rem;
      vertical-align: middle;
    }
    .admin-tab.active .admin-tab-count { background: var(--accent-soft); color: var(--accent-dark); }

    /* ── Modal ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0; z-index: 100;
      background: rgba(31,42,35,0.45);
      align-items: center; justify-content: center; padding: 1.5rem;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #fff; border-radius: 14px; max-width: 380px; width: 100%;
      padding: 1.5rem 1.4rem 1.25rem; box-shadow: 0 18px 50px rgba(31,42,35,0.25);
      border-top: 4px solid var(--red);
    }
    .modal.modal-safe { border-top-color: var(--accent); }
    .modal-title { font-size: 1.02rem; font-weight: 700; color: var(--text); margin-bottom: 0.6rem; }
    .modal-msg { font-size: 0.85rem; color: var(--muted); line-height: 1.6; margin-bottom: 1.25rem; }
    .modal-msg strong { color: var(--text); }
    .modal-actions { display: flex; gap: 0.6rem; justify-content: flex-end; }
    .btn-ghost { background: #fff; color: var(--muted); border: 1px solid var(--border-strong); }
    .btn-ghost:hover { border-color: var(--text); color: var(--text); }
    .btn-danger { background: var(--red); color: #fff; }
    .btn-danger:hover { filter: brightness(0.93); }

    /* ── Loading ── */
    .loading { text-align: center; padding: 3rem 1rem; color: var(--muted); font-size: 0.85rem; }

    /* ── Admin card list ── */
    .admin-list { display: flex; flex-direction: column; gap: 0.75rem; }
    .admin-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .admin-card:hover { border-color: var(--border-strong); box-shadow: 0 2px 8px rgba(31,42,35,0.06); }
    .admin-card.dragging { opacity: 0.4; }
    .admin-card.drag-over { border-color: var(--accent); border-style: dashed; box-shadow: 0 0 0 2px var(--accent-soft); }

    .admin-card-header {
      display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap;
      padding: 0.7rem 0.9rem; background: var(--surface2);
      border-bottom: 1px solid var(--border);
    }
    .admin-card-title { font-weight: 700; font-size: 0.92rem; flex: 1; min-width: 0; }
    .admin-card-actions { display: flex; gap: 0.35rem; margin-left: auto; flex-shrink: 0; }

    .admin-card-body { padding: 0.6rem 0.9rem 0.7rem; display: flex; flex-direction: column; gap: 0.4rem; }
    .admin-card-info { display: flex; flex-wrap: wrap; align-items: center; gap: 0.4rem 0.6rem; font-size: 0.75rem; color: var(--muted); }
    .admin-card-info .info-sep { color: var(--border-strong); flex-shrink: 0; }
    .admin-card-tags { display: flex; flex-wrap: wrap; gap: 0.3rem; }
    .admin-card-entries-row { display: flex; align-items: baseline; gap: 0.5rem; }
    .admin-card-entries-label { font-size: 0.68rem; color: var(--muted); font-weight: 700; letter-spacing: 0.04em; white-space: nowrap; }
    .admin-card-entry-names { display: flex; flex-wrap: wrap; gap: 0.3rem; }

    /* ── Edit modal ── */
    .edit-modal-overlay {
      display: none; position: fixed; inset: 0; z-index: 200;
      background: rgba(31,42,35,0.5);
      align-items: flex-start; justify-content: center;
      padding: 2rem 1rem 3rem; overflow-y: auto;
    }
    .edit-modal-overlay.open { display: flex; }
    .edit-modal-dialog {
      background: #fff; border-radius: 14px; max-width: 500px; width: 100%;
      padding: 1.5rem 1.5rem 1.25rem;
      box-shadow: 0 18px 50px rgba(31,42,35,0.25);
      border-top: 4px solid var(--accent);
      margin: auto;
    }
    .edit-modal-title { font-size: 1rem; font-weight: 700; color: var(--text); margin-bottom: 1rem; }
    .edit-modal-fields { display: flex; flex-direction: column; gap: 0.45rem; margin-bottom: 1.25rem; }
    .edit-modal-actions { display: flex; gap: 0.6rem; justify-content: flex-end; }

    /* ── レスポンシブ ── */
    @media (max-width: 600px) {
      header { padding: 3.4rem 1rem 1.5rem; }
      .header-admin-area { top: 0.75rem; right: 0.75rem; gap: 0.4rem; }
      .header-admin-btn { padding: 0.35rem 0.8rem; font-size: 0.72rem; }
      .header-admin-status { font-size: 0.68rem; padding: 0.22rem 0.6rem; }
      main { padding: 1.5rem 0.9rem 4rem; }
      .filter-bar { gap: 0.4rem; margin-bottom: 1.5rem; }
      .filter-chip { padding: 0.35rem 0.8rem; font-size: 0.75rem; }
      .work-header { padding: 0.8rem 1rem 0.65rem; }
      .work-info, .work-tags, .work-bottom { padding-left: 1rem; padding-right: 1rem; }
      .work-title { font-size: 0.95rem; }
      .entry-form .btn { padding: 0.5rem 0.8rem; font-size: 0.8rem; }
      .admin-login { flex-wrap: wrap; }
      .pass-field { flex: 1 1 100%; }
      .pass-field input { width: 100%; }
      .admin-login > .btn { width: 100%; }
      .add-cat-row { flex-wrap: wrap; }
      .cat-row { flex-wrap: wrap; }
      .cat-row .a-input { flex: 1 1 100%; }
      /* admin card: タイトルを1行目に確保し、バッジ+ボタンを2行目に */
      .admin-card-header { padding: 0.6rem 0.75rem; gap: 0.35rem; align-items: center; }
      .admin-card-title {
        flex: 1 1 calc(100% - 2.2rem); /* ハンドルの幅を除いた全幅 → バッジ類が次行へ */
        font-size: 0.85rem;
      }
      .admin-card-actions { margin-left: auto; gap: 0.3rem; }
      .admin-card-actions .btn-xs { padding: 0.28rem 0.55rem; font-size: 0.7rem; }
      .admin-card-body { padding: 0.5rem 0.75rem 0.6rem; }
      .admin-card-entries-row { flex-direction: column; align-items: flex-start; gap: 0.2rem; }

      /* edit modal */
      .edit-modal-overlay { padding: 0.75rem 0.75rem 2rem; }
      .edit-modal-dialog { padding: 1.25rem 1rem 1rem; border-radius: 10px; }
      .edit-modal-title { font-size: 0.92rem; margin-bottom: 0.85rem; }
      .edit-modal-fields .field-label { min-width: 2.2rem; font-size: 0.68rem; }
      .edit-modal-actions { flex-direction: column-reverse; }
      .edit-modal-actions .btn { width: 100%; }

      .modal-actions { flex-direction: column-reverse; }
      .modal-actions .btn { width: 100%; }
    }

    @media (max-width: 360px) {
      .header-pass { font-size: 0.68rem; padding: 0.25rem 0.6rem; }
      .entry-form { flex-wrap: wrap; }
      .entry-form .btn { width: 100%; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-pattern"></div>
  <div class="header-admin-area">
    <span class="header-admin-status" id="headerStatus" hidden>管理者としてログイン中</span>
    <button class="admin-toggle header-admin-btn" onclick="toggleAdmin()">管理者ログイン</button>
  </div>
  <p class="header-eyebrow">Murder Mystery</p>
  <h1>参加<span>エントリー</span></h1>
  <div class="header-divider"></div>
  <p class="header-subtitle">参加したい作品に名前を入力してね</p>
  <p class="header-pass">管理者パスワード：<code id="headerPass"></code></p>
</header>

<div class="sync-bar" id="syncBar">
  <span class="sync-dot"></span>
  <span id="syncText">接続中...</span>
</div>

<div class="admin-panel" id="adminPanel">
  <div class="admin-panel-inner">
    <div class="admin-login" id="adminLoginBox">
      <div class="pass-field">
        <input type="password" id="adminPass" placeholder="パスワード"
               onkeydown="if(event.key==='Enter') adminLogin()" />
        <button type="button" class="pass-toggle" id="passToggle"
                aria-label="パスワードを表示" onclick="togglePassVisible()">表示</button>
      </div>
      <button class="btn btn-primary" onclick="adminLogin()">ログイン</button>
      <button class="btn btn-ghost" onclick="closeAdminPanel()">キャンセル</button>
    </div>
    <p class="admin-err" id="adminErr"></p>
    <div id="adminView"></div>
  </div>
</div>

<main id="publicView">
  <div class="filter-bar" id="filterBar" role="group" aria-label="カテゴリで絞り込み"></div>
  <div id="works"><p class="loading">データを読み込み中...</p></div>
</main>

<div class="modal-overlay" id="confirmModal" role="dialog" aria-modal="true" aria-labelledby="confirmTitle" aria-describedby="confirmMsg">
  <div class="modal">
    <h2 class="modal-title" id="confirmTitle"></h2>
    <p class="modal-msg" id="confirmMsg"></p>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="confirmCancel" onclick="closeConfirm()">キャンセル</button>
      <button class="btn btn-danger" id="confirmOk">削除する</button>
    </div>
  </div>
</div>

<!-- 編集モーダル -->
<div class="edit-modal-overlay" id="editModalOverlay" role="dialog" aria-modal="true" aria-labelledby="editModalHeading">
  <div class="edit-modal-dialog">
    <h2 class="edit-modal-title" id="editModalHeading"></h2>
    <div class="edit-modal-fields">
      <div class="field-row"><span class="field-label">作品名</span><input class="a-input fill" id="editModal-title"    maxlength="40" /></div>
      <div class="field-row"><span class="field-label">人数</span>  <input class="a-input fill" id="editModal-players"  maxlength="20" placeholder="例：6〜8名" /></div>
      <div class="field-row"><span class="field-label">定員</span>  <input class="a-input" id="editModal-capacity" type="number" min="0" max="99" style="width:5rem" /><span class="field-hint">名（0で無制限）</span></div>
      <div class="field-row"><span class="field-label">時間</span>  <input class="a-input fill" id="editModal-time"     maxlength="20" placeholder="例：約120分" /></div>
      <div class="field-row"><span class="field-label">作者</span>  <input class="a-input fill" id="editModal-author"   maxlength="40" /></div>
      <div class="field-row"><span class="field-label">金額</span>  <input class="a-input fill" id="editModal-price"    maxlength="20" placeholder="例：2,000円" /></div>
      <div class="field-row"><span class="field-label">タグ</span>  <input class="a-input fill" id="editModal-tags"      maxlength="100" placeholder="カンマ区切りで入力" /></div>
      <div class="field-row"><span class="field-label">カテゴリ</span><select class="a-select" id="editModal-cat"></select></div>
      <div class="field-row"><span class="field-label">作品URL</span><input class="a-input fill" id="editModal-url"       maxlength="500" placeholder="https://..." /></div>
      <div class="field-row"><span class="field-label">画像URL</span><input class="a-input fill" id="editModal-thumbnail" maxlength="500" placeholder="https://..." /></div>
      <hr style="border:none;border-top:1px solid var(--border);margin:0.4rem 0" />
      <div class="field-row"><span class="field-label">状態</span>
        <select class="a-select" id="editModal-status">
          <option value="recruiting">募集中</option>
          <option value="confirmed">開催確定</option>
          <option value="done">開催済み</option>
        </select>
      </div>
      <div class="field-row"><span class="field-label">開催日時</span><input class="a-input fill" id="editModal-scheduledAt" maxlength="40" placeholder="例：7/20(日) 14:00" /></div>
      <div class="field-row"><span class="field-label">場所</span>    <input class="a-input fill" id="editModal-venue"       maxlength="60" placeholder="例：〇〇カフェ 2F" /></div>
    </div>
    <p class="msg" id="editModal-msg" role="status" aria-live="polite"></p>
    <div class="edit-modal-actions">
      <button class="btn btn-ghost" onclick="closeEditModal()">キャンセル</button>
      <button class="btn btn-primary" onclick="saveEditModal()">保存する</button>
    </div>
  </div>
</div>

<!-- Firebase SDK (CDN) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
// ── Firebase 初期化 ───────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyA5lVqe566PsDFm9R-VTORM6doHPm1lG_k",
  authDomain: "murder-mystery-entry.firebaseapp.com",
  databaseURL: "https://murder-mystery-entry-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "murder-mystery-entry",
  storageBucket: "murder-mystery-entry.firebasestorage.app",
  messagingSenderId: "350564784867",
  appId: "1:350564784867:web:104183a27bd5106e9243d6"
};

firebase.initializeApp(firebaseConfig);
const db      = firebase.database();
const rootRef = db.ref('mm');

// ── デフォルトデータ ──────────────────────────────────────
const DEFAULT_CATEGORIES = ['初回の方向け', '複数回経験済み'];

const WORKS = [
  { id: 'w1', title: '九頭竜館の殺人',            defaultCat: '初回の方向け',    players: '7〜9名', time: '約120分', capacity: 9, author: 'Group SNE', tags: ['Level★☆☆', '館', 'ホラー', 'GM不要'] },
  { id: 'w2', title: '人狼村の祝祭',              defaultCat: '初回の方向け',    players: '7〜8名', time: '約120分', capacity: 8, author: 'Group SNE', tags: ['Level★☆☆', 'ファンタジー', 'GM不要'] },
  { id: 'w3', title: '最果亭の災禍',              defaultCat: '初回の方向け',    players: '6〜8名', time: '約180分', capacity: 8, author: 'Group SNE', tags: ['Level★☆☆', 'ファンタジー', 'GM不要'] },
  { id: 'w4', title: '何度だって青い月に火を灯した', defaultCat: '複数回経験済み', players: '6〜7名', time: '約150分', capacity: 7, author: 'Group SNE', tags: ['Level★★☆', 'マフィア', '群像劇', 'GM不要'] },
  { id: 'w5', title: 'ダークユールに贖いを',        defaultCat: '複数回経験済み', players: '7〜9名', time: '約180分', capacity: 9, author: 'Group SNE', tags: ['Level★★★', '吸血鬼', 'ロールプレイ', 'GM不要'] },
];

const ADMIN_PASS = 'mystery'; // ← パスワードをここで変更

// ── Firebase 状態（リアルタイム同期） ────────────────────
let fbState = { entries: {}, categories: null, workcats: {}, workinfo: {}, deleted: [], customWorks: {}, workOrder: [] };
let fbReady = false;

// Firebase は配列をオブジェクトとして返すことがあるため正規化
function toArr(v) {
  if (!v) return [];
  return Array.isArray(v) ? v : Object.values(v);
}

rootRef.on('value', (snapshot) => {
  const data          = snapshot.val() || {};
  fbState.entries     = data.entries    || {};
  fbState.categories  = data.categories || null;
  fbState.workcats    = data.workcats   || {};
  fbState.workinfo    = data.workinfo   || {};
  fbState.deleted     = toArr(data.deleted);
  fbState.workOrder   = toArr(data.workOrder);
  // customWorks の tags も配列に正規化
  const rawCW = data.customWorks || {};
  fbState.customWorks = {};
  Object.entries(rawCW).forEach(([id, w]) => {
    fbState.customWorks[id] = { ...w, tags: toArr(w.tags) };
  });
  fbReady = true;
  setSyncOnline(true);
  render();
  if (isAdmin && document.getElementById('adminView').innerHTML) renderAdmin();
});

db.ref('.info/connected').on('value', (snap) => {
  if (fbReady) setSyncOnline(snap.val() === true);
});

function setSyncOnline(online) {
  const bar  = document.getElementById('syncBar');
  const text = document.getElementById('syncText');
  bar.classList.toggle('offline', !online);
  text.textContent = online
    ? 'リアルタイム同期中 — 他の人の操作もすぐ反映されます'
    : 'オフライン — インターネット接続を確認してください';
}

// ── Firebase 書き込みヘルパー ─────────────────────────────
function fbSet(path, value) { return rootRef.child(path).set(value); }

// ── データアクセサ ────────────────────────────────────────
function getDeleted()    { return fbState.deleted; }
function getWorks() {
  const del    = getDeleted();
  const base   = WORKS.filter(w => !del.includes(w.id));
  const custom = Object.entries(fbState.customWorks)
    .filter(([id]) => !del.includes(id))
    .map(([id, w]) => ({ ...w, id }));
  const all    = [...base, ...custom];
  const order  = fbState.workOrder;
  if (!order.length) return all;
  // workOrder に従って並べ、未登録のものは末尾に追加
  const ordered = order.map(id => all.find(w => w.id === id)).filter(Boolean);
  const rest    = all.filter(w => !order.includes(w.id));
  return [...ordered, ...rest];
}
function getCategories() { return fbState.categories || [...DEFAULT_CATEGORIES]; }
function getWorkCat(w)   { return fbState.workcats[w.id] || w.defaultCat || getCategories()[0] || ''; }

function guessCapacity(playersText) {
  const nums = String(playersText).match(/\d+/g);
  if (!nums || !nums.length) return 0;
  return Math.max(...nums.map(Number));
}

function getInfo(w) {
  const saved   = fbState.workinfo[w.id] || {};
  const players = saved.players ?? w.players ?? '';
  return {
    title:       saved.title       ?? w.title    ?? '',
    players:     players,
    time:        saved.time        ?? w.time     ?? '',
    author:      saved.author      ?? w.author   ?? '',
    price:       saved.price       ?? w.price    ?? '',
    tags:        toArr(saved.tags  ?? w.tags),
    capacity:    (saved.capacity   ?? w.capacity ?? guessCapacity(players)) || 0,
    status:      saved.status      ?? 'recruiting',
    scheduledAt: saved.scheduledAt ?? '',
    venue:       saved.venue       ?? '',
    thumbnail:   saved.thumbnail   ?? w.thumbnail   ?? '',
    url:         saved.url         ?? w.url         ?? '',
  };
}

function isCustomWork(w) { return !!fbState.customWorks[w.id]; }

function saveInfo(id, patch) {
  const w = getWorks().find(x => x.id === id);
  return fbSet(`workinfo/${id}`, { ...getInfo(w), ...patch });
}

// ── SVG アイコン ──────────────────────────────────────────
const ICON = {
  person: `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true" focusable="false"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>`,
  clock:  `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true" focusable="false"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`,
  author: `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true" focusable="false"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>`,
  price:  `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true" focusable="false"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>`,
};

// ── メイン描画 ────────────────────────────────────────────
let activeFilter = 'all';
let activePlayerFilter = 'all'; // 'all' or a capacity number
let showArchived = false;

function getAllCats() {
  const cats = getCategories();
  const hasUngrouped = getWorks().some(w => !cats.includes(getWorkCat(w)));
  return hasUngrouped ? [...cats, 'その他'] : [...cats];
}

function getPlayerOptions() {
  const caps = getWorks()
    .map(w => getInfo(w).capacity)
    .filter(c => c > 0);
  return [...new Set(caps)].sort((a, b) => a - b);
}

function matchesPlayerFilter(w) {
  if (activePlayerFilter === 'all') return true;
  return getInfo(w).capacity === activePlayerFilter;
}

function setFilter(cat) { activeFilter = cat; render(); }
function setPlayerFilter(val) { activePlayerFilter = val; render(); }
function toggleArchived() { showArchived = !showArchived; render(); }

function renderFilterBar() {
  const cats    = getAllCats();
  const works   = getWorks();
  const playerOpts = getPlayerOptions();

  const countOf = c => (c === 'その他')
    ? works.filter(w => !getCategories().includes(getWorkCat(w)) && matchesPlayerFilter(w)).length
    : works.filter(w => getWorkCat(w) === c && matchesPlayerFilter(w)).length;

  const playerCountOf = cap =>
    works.filter(w => getInfo(w).capacity === cap && (activeFilter === 'all' || getWorkCat(w) === activeFilter || (activeFilter === 'その他' && !getCategories().includes(getWorkCat(w))))).length;

  const catSection = [
    `<button class="filter-chip ${activeFilter==='all'?'active':''}" aria-pressed="${activeFilter==='all'}" onclick="setFilter('all')">すべて<span class="filter-count">${works.filter(w => matchesPlayerFilter(w)).length}</span></button>`,
    ...cats.map(c =>
      `<button class="filter-chip ${activeFilter===c?'active':''}" aria-pressed="${activeFilter===c}" onclick="setFilter('${esc(c)}')">${esc(c)}<span class="filter-count">${countOf(c)}</span></button>`
    ),
  ].join('');

  const playerSection = playerOpts.length ? [
    `<button class="filter-chip ${activePlayerFilter==='all'?'active':''}" aria-pressed="${activePlayerFilter==='all'}" onclick="setPlayerFilter('all')">すべて</button>`,
    ...playerOpts.map(cap =>
      `<button class="filter-chip ${activePlayerFilter===cap?'active':''}" aria-pressed="${activePlayerFilter===cap}" onclick="setPlayerFilter(${cap})">${cap}名<span class="filter-count">${playerCountOf(cap)}</span></button>`
    ),
  ].join('') : '';

  const archivedCount = getWorks().filter(w => ['confirmed','done'].includes(getInfo(w).status)).length;
  const archivedSection = `<div class="filter-section" style="justify-content:flex-end">
      <button class="archived-toggle-btn ${showArchived ? 'active' : ''}"
              onclick="toggleArchived()"
              aria-pressed="${showArchived}">
        ${showArchived ? '✓ 開催確定・済みを表示中' : `開催確定・済みを表示${archivedCount > 0 ? `（${archivedCount}件）` : ''}`}
      </button>
     </div>`;

  document.getElementById('filterBar').innerHTML =
    `<div class="filter-section"><span class="filter-section-label">カテゴリ</span>${catSection}</div>` +
    (playerSection ? `<div class="filter-section"><span class="filter-section-label">最大人数</span>${playerSection}</div>` : '') +
    archivedSection;
}

function render() {
  if (!fbReady) return;
  const entries = fbState.entries;
  const cats    = getCategories();
  const works   = getWorks();

  if (activeFilter !== 'all' && !getAllCats().includes(activeFilter)) activeFilter = 'all';
  renderFilterBar();

  const filtered = works.filter(w => {
    const s = getInfo(w).status;
    return matchesPlayerFilter(w) && (
      showArchived ? s !== 'recruiting' : s === 'recruiting'
    );
  });
  let groups = cats.map(cat => ({ cat, works: filtered.filter(w => getWorkCat(w) === cat) })).filter(g => g.works.length > 0);
  const ungrouped = filtered.filter(w => !cats.includes(getWorkCat(w)));
  if (ungrouped.length) groups.push({ cat: 'その他', works: ungrouped });
  if (activeFilter !== 'all') groups = groups.filter(g => g.cat === activeFilter);

  document.getElementById('works').innerHTML = groups.length
    ? groups.map(g => `
    <div class="category-group">
      <div class="category-heading">
        <span class="category-heading-label">${esc(g.cat)}</span>
        <span class="category-heading-line"></span>
      </div>
      <div class="works">${g.works.map(w => renderWork(w, entries[w.id] || [])).join('')}</div>
    </div>`).join('')
    : '<p class="no-result">該当する作品がありません</p>';
}

function renderWork(w, entries) {
  const info     = getInfo(w);
  const cap      = info.capacity;
  const isFull   = cap > 0 && entries.length >= cap;
  const status   = info.status; // 'recruiting' | 'confirmed' | 'done'
  const isDone   = status === 'done';
  const isConfirmed = status === 'confirmed';
  const entryOpen   = status === 'recruiting' && !isFull;

  const chips = entries.length
    ? entries.map((n, i) =>
        `<span class="entry-chip">${esc(n)}<button class="chip-remove" title="エントリーを取り消す" aria-label="${esc(n)} のエントリーを取り消す" onclick="removeOwnEntry('${w.id}',${i})">×</button></span>`
      ).join('')
    : '<span class="entry-empty">まだ誰もエントリーしていません</span>';

  const tagHtml = info.tags.length ? info.tags.map(t => `<span class="tag">${esc(t)}</span>`).join('') : '';

  // 定員バッジ
  let badge, badgeClass = 'work-badge';
  if (isFull && !isConfirmed && !isDone) { badge = '満員'; badgeClass += ' work-badge-full'; }
  else if (cap > 0) { badge = `${entries.length}/${cap}名`; }
  else              { badge = `${entries.length}名エントリー中`; }

  // ステータスバッジ
  const statusBadge = isConfirmed
    ? `<span class="status-badge status-confirmed">📅 開催確定</span>`
    : isDone
      ? `<span class="status-badge status-done">開催済み</span>`
      : '';

  // 開催日時・場所バー（確定時のみ）
  const scheduleBar = isConfirmed && (info.scheduledAt || info.venue) ? `
    <div class="work-schedule">
      ${info.scheduledAt ? `<span class="work-schedule-item">🗓 ${esc(info.scheduledAt)}</span>` : ''}
      ${info.venue       ? `<span class="work-schedule-item">📍 ${esc(info.venue)}</span>`       : ''}
    </div>` : '';

  // エントリーフォーム
  let formHtml;
  if (isDone) {
    formHtml = `<p class="full-notice">この作品は開催済みです。</p>`;
  } else if (isConfirmed) {
    formHtml = `<p class="full-notice">開催が確定しました。エントリーの受付は終了しています。</p>`;
  } else if (isFull) {
    formHtml = `<p class="full-notice">定員に達したため、現在エントリーを受け付けていません。</p>`;
  } else {
    formHtml = `<div class="entry-form">
          <input class="entry-input" id="input-${w.id}" placeholder="名前を入力" maxlength="20"
                 aria-label="${esc(info.title)} に参加する名前を入力"
                 onkeydown="if(event.key==='Enter') doEntry('${w.id}')" />
          <button class="btn btn-primary" onclick="doEntry('${w.id}')">エントリー</button>
        </div>`;
  }

  const cardClass = ['work', isFull && !isConfirmed && !isDone ? 'is-full' : '', isDone ? 'is-done' : ''].filter(Boolean).join(' ');

  const urlLink = info.url
    ? `<a href="${esc(info.url)}" target="_blank" rel="noopener noreferrer" class="work-url-link">
         <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
         作品ページ
       </a>` : '';

  return `
    <div class="${cardClass}" data-id="${w.id}">
      ${info.thumbnail ? `<div class="work-thumbnail"><img src="${esc(info.thumbnail)}" alt="${esc(info.title)} サムネイル" loading="lazy" onerror="this.closest('.work-thumbnail').style.display='none'" /></div>` : ''}
      <div class="work-header">
        <span class="work-title">${esc(info.title)}</span>
        <span class="${badgeClass}">${badge}</span>
        ${statusBadge}
      </div>
      <div class="work-info">
        <span class="info-item"><span class="sr-only">参加人数</span>${ICON.person} ${esc(info.players)}</span>
        <span class="info-sep" aria-hidden="true">·</span>
        <span class="info-item"><span class="sr-only">所要時間</span>${ICON.clock} ${esc(info.time)}</span>
        ${info.author ? `<span class="info-sep" aria-hidden="true">·</span><span class="info-item"><span class="sr-only">作者</span>${ICON.author} ${esc(info.author)}</span>` : ''}
        ${info.price  ? `<span class="info-sep" aria-hidden="true">·</span><span class="info-item"><span class="sr-only">金額</span>${ICON.price} ${esc(info.price)}</span>` : ''}
        ${urlLink ? `<span class="info-sep" aria-hidden="true">·</span>${urlLink}` : ''}
      </div>
      ${scheduleBar}
      ${tagHtml ? `<div class="work-tags">${tagHtml}</div>` : ''}
      <div class="work-bottom">
        ${entries.length ? '<div class="entries-label">エントリー済み</div>' : ''}
        <div class="entry-list">${chips}</div>
        ${formHtml}
        <p class="msg" id="msg-${w.id}" role="status" aria-live="polite"></p>
      </div>
    </div>`;
}

// ── エントリー ────────────────────────────────────────────
function doEntry(id) {
  const input = document.getElementById(`input-${id}`);
  const name  = input.value.trim();
  const msgEl = document.getElementById(`msg-${id}`);
  if (!name) { showMsg(msgEl, '名前を入力してください', 'err'); return; }

  const list = fbState.entries[id] || [];
  if (list.includes(name)) { showMsg(msgEl, `「${name}」はすでにエントリー済みです`, 'err'); return; }

  const w   = getWorks().find(x => x.id === id);
  const cap = w ? getInfo(w).capacity : 0;
  if (cap > 0 && list.length >= cap) { showMsg(msgEl, '定員に達したためエントリーできません', 'err'); return; }

  const title = w ? getInfo(w).title : '';
  openConfirm({
    title: 'エントリーの確認',
    message: `<strong>${esc(title)}</strong> に<br><strong>${esc(name)}</strong> としてエントリーします。よろしいですか？`,
    okLabel: 'エントリーする', danger: false,
    onConfirm: () => commitEntry(id, name),
  });
}

function commitEntry(id, name) {
  const list = [...(fbState.entries[id] || [])];
  if (list.includes(name)) return;
  const w   = getWorks().find(x => x.id === id);
  const cap = w ? getInfo(w).capacity : 0;
  if (cap > 0 && list.length >= cap) return;
  list.push(name);
  fbSet(`entries/${id}`, list).then(() => {
    const input = document.getElementById(`input-${id}`);
    if (input) input.value = '';
    showMsg(document.getElementById(`msg-${id}`), `「${name}」でエントリーしました！`, 'ok');
  });
}

function confirmRemoveEntry(id, index, label = '取り消し') {
  const list  = fbState.entries[id] || [];
  const name  = list[index];
  if (name === undefined) return;
  const w     = getWorks().find(x => x.id === id);
  const title = w ? getInfo(w).title : '';
  openConfirm({
    title: `エントリーの${label}`,
    message: `<strong>${esc(title)}</strong> の<br><strong>${esc(name)}</strong> のエントリーを${label}します。よろしいですか？`,
    okLabel: `${label}する`, danger: true,
    onConfirm: () => {
      const cur = [...(fbState.entries[id] || [])];
      const pos = cur[index] === name ? index : cur.indexOf(name);
      if (pos === -1) return;
      cur.splice(pos, 1);
      fbSet(`entries/${id}`, cur.length ? cur : null);
    },
  });
}

function removeOwnEntry(id, index) { confirmRemoveEntry(id, index, '取り消し'); }
function removeEntry(id, index)    { confirmRemoveEntry(id, index, '削除'); }

function showMsg(el, text, type) {
  if (!el) return;
  el.textContent = text;
  el.className   = `msg msg-${type}`;
  setTimeout(() => { el.textContent = ''; el.className = 'msg'; }, 3000);
}

// ── 管理者 ────────────────────────────────────────────────
let isAdmin = false;
let adminTab = 'recruiting'; // 'recruiting' | 'confirmed' | 'done'

function setAdminTab(tab) { adminTab = tab; renderAdmin(); }

function toggleAdmin() {
  if (isAdmin) { adminLogout(); return; }
  document.getElementById('adminPanel').classList.toggle('open');
}

function closeAdminPanel() {
  document.getElementById('adminPanel').classList.remove('open');
  document.getElementById('adminPass').value = '';
  document.getElementById('adminErr').textContent = '';
}

function togglePassVisible() {
  const input = document.getElementById('adminPass');
  const btn   = document.getElementById('passToggle');
  const hide  = input.type === 'password';
  input.type  = hide ? 'text' : 'password';
  btn.textContent = hide ? '隠す' : '表示';
  btn.setAttribute('aria-label', hide ? 'パスワードを隠す' : 'パスワードを表示');
}

function adminLogin() {
  if (document.getElementById('adminPass').value !== ADMIN_PASS) {
    document.getElementById('adminErr').textContent = 'パスワードが違います'; return;
  }
  document.getElementById('adminErr').textContent = '';
  isAdmin = true;
  showAdminUI();
}

function adminLogout() {
  isAdmin = false;
  document.getElementById('adminPass').value = '';
  document.getElementById('adminView').innerHTML = '';
  document.getElementById('adminLoginBox').style.display = '';
  document.getElementById('publicView').style.display = '';
  document.getElementById('publicView').classList.remove('admin-mode');
  document.getElementById('adminPanel').classList.remove('open');
  document.querySelector('.header-admin-btn').textContent = '管理者ログイン';
  document.getElementById('headerStatus').hidden = true;
}

function showAdminUI() {
  document.getElementById('adminLoginBox').style.display = 'none';

  document.querySelector('.header-admin-btn').textContent = '管理者ログアウト';

        ).join('')

// ── カテゴリ操作 ──────────────────────────────────────────
function addCat() {
  const input = document.getElementById('newCatInput');
  const name  = input.value.trim();
  if (!name) return;
  const cats = getCategories();
  if (cats.includes(name)) return;
  cats.push(name);
  input.value = '';
  fbSet('categories', cats);
}

function saveCat(i) {
  const val = document.getElementById(`cat-${i}`).value.trim();
  if (!val) return;
  const cats = getCategories();
  const old  = cats[i];
  cats[i]    = val;
  const wc   = { ...fbState.workcats };
  WORKS.forEach(w => { if (wc[w.id] === old) wc[w.id] = val; });
  fbSet('categories', cats);
  fbSet('workcats', wc);
}

function deleteCat(i) {
  const cats = getCategories();
  const name = cats[i];
  if (name === undefined) return;
  openConfirm({
    title: 'カテゴリを削除',
    message: `<strong>${esc(name)}</strong> を削除します。<br>このカテゴリの作品は「その他」に移動します。よろしいですか？`,
    okLabel: '削除する', danger: true,
    onConfirm: () => { const cur = getCategories(); cur.splice(i, 1); fbSet('categories', cur); },
  });
}

// ── 編集モーダル ───────────────────────────────────────────
let editModalWorkId = null;

function openEditModal(id) {
  const w = getWorks().find(x => x.id === id);
  if (!w) return;
  const info = getInfo(w);
  editModalWorkId = id;

  const catOpts = getCategories().map(c =>
    `<option value="${esc(c)}" ${getWorkCat(w) === c ? 'selected' : ''}>${esc(c)}</option>`
  ).join('');

  document.getElementById('editModalHeading').textContent = `「${info.title}」を編集`;
  document.getElementById('editModal-title').value       = info.title;
  document.getElementById('editModal-players').value     = info.players;
  document.getElementById('editModal-capacity').value    = info.capacity;
  document.getElementById('editModal-time').value        = info.time;
  document.getElementById('editModal-author').value      = info.author;
  document.getElementById('editModal-price').value       = info.price;
  document.getElementById('editModal-tags').value        = info.tags.join(',');
  document.getElementById('editModal-cat').innerHTML     = catOpts;
  document.getElementById('editModal-status').value      = info.status;
  document.getElementById('editModal-scheduledAt').value = info.scheduledAt;
  document.getElementById('editModal-venue').value       = info.venue;
  document.getElementById('editModal-url').value         = info.url;
  document.getElementById('editModal-thumbnail').value   = info.thumbnail;
  document.getElementById('editModal-msg').textContent = '';
  document.getElementById('editModalOverlay').classList.add('open');
  document.getElementById('editModal-title').focus();
}

function closeEditModal() {
  document.getElementById('editModalOverlay').classList.remove('open');
  editModalWorkId = null;
}

function saveEditModal() {
  const id = editModalWorkId;
  if (!id) return;
  const title    = document.getElementById('editModal-title').value.trim();
  const players  = document.getElementById('editModal-players').value.trim();
  const capacity = Math.max(0, parseInt(document.getElementById('editModal-capacity').value, 10) || 0);
  const time     = document.getElementById('editModal-time').value.trim();
  const author   = document.getElementById('editModal-author').value.trim();
  const price    = document.getElementById('editModal-price').value.trim();
  const tags     = document.getElementById('editModal-tags').value.split(',').map(t => t.trim()).filter(Boolean);
  const cat         = document.getElementById('editModal-cat').value;
  const status      = document.getElementById('editModal-status').value;
  const scheduledAt = document.getElementById('editModal-scheduledAt').value.trim();
  const venue       = document.getElementById('editModal-venue').value.trim();
  const url         = document.getElementById('editModal-url').value.trim();
  const thumbnail   = document.getElementById('editModal-thumbnail').value.trim();
  const msgEl       = document.getElementById('editModal-msg');

  if (!title) { showMsg(msgEl, '作品名は必須です', 'err'); return; }

  const commit = () => {
    saveInfo(id, { title, players, time, author, price, tags, capacity, status, scheduledAt, venue, url, thumbnail });
    fbSet(`workcats/${id}`, cat);
    closeEditModal();
  };

  const current = (fbState.entries[id] || []).length;
  if (capacity > 0 && capacity < current) {
    openConfirm({
      title: '定員の確認',
      message: `現在のエントリー数（<strong>${current}名</strong>）より定員（<strong>${capacity}名</strong>）が少なくなっています。<br>超過している参加者は手動で取り消す必要があります。保存しますか？`,
      okLabel: '保存する', danger: false, onConfirm: commit,
    });
    return;
  }
  commit();
}

// モーダル外クリック・Escで閉じる
document.getElementById('editModalOverlay').addEventListener('click', e => {
  if (e.target.id === 'editModalOverlay') closeEditModal();
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && document.getElementById('editModalOverlay').classList.contains('open')) closeEditModal();
});

// ── 作品情報操作 ──────────────────────────────────────────
function saveWorkInfo(id) {
  const title    = document.getElementById(`i-title-${id}`).value.trim();
  const players  = document.getElementById(`i-players-${id}`).value.trim();
  const time     = document.getElementById(`i-time-${id}`).value.trim();
  const author   = document.getElementById(`i-author-${id}`).value.trim();
  const price    = document.getElementById(`i-price-${id}`).value.trim();
  const tags     = document.getElementById(`i-tags-${id}`).value.split(',').map(t => t.trim()).filter(Boolean);
  const capacity = Math.max(0, parseInt(document.getElementById(`i-capacity-${id}`).value, 10) || 0);
  if (!title) return;

  const commit  = () => saveInfo(id, { title, players, time, author, price, tags, capacity }).then(() => clearDirty(id));
  const current = (fbState.entries[id] || []).length;
  if (capacity > 0 && capacity < current) {
    openConfirm({
      title: '定員の確認',
      message: `現在のエントリー数（<strong>${current}名</strong>）より定員（<strong>${capacity}名</strong>）が少なくなっています。<br>超過している参加者は手動で取り消す必要があります。保存しますか？`,
      okLabel: '保存する', danger: false, onConfirm: commit,
    });
    return;
  }
  commit();
}

function resetWorkInfo(id) {
  const wi = { ...fbState.workinfo };
  delete wi[id];
  fbSet('workinfo', Object.keys(wi).length ? wi : null);
}

function saveWorkCat(id) {
  fbSet('workcats', { ...fbState.workcats, [id]: document.getElementById(`i-cat-${id}`).value });
}

// ── 確認モーダル ──────────────────────────────────────────
let pendingAction = null;

function openConfirm({ title, message, okLabel, onConfirm, danger = true }) {
  document.getElementById('confirmTitle').textContent = title;
  document.getElementById('confirmMsg').innerHTML = message;
  const okBtn = document.getElementById('confirmOk');
  okBtn.textContent = okLabel || '削除する';
  okBtn.className = danger ? 'btn btn-danger' : 'btn btn-primary';
  document.querySelector('#confirmModal .modal').classList.toggle('modal-safe', !danger);
  pendingAction = onConfirm;
  document.getElementById('confirmModal').classList.add('open');
  document.getElementById('confirmCancel').focus();
}

function closeConfirm() {
  document.getElementById('confirmModal').classList.remove('open');
  pendingAction = null;
}

document.getElementById('confirmOk').addEventListener('click', () => {
  const action = pendingAction; closeConfirm(); if (action) action();
});
document.getElementById('confirmModal').addEventListener('click', (e) => {
  if (e.target.id === 'confirmModal') closeConfirm();
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && document.getElementById('confirmModal').classList.contains('open')) closeConfirm();
});

// ── 全エントリーリセット ──────────────────────────────────
function clearAll() {
  openConfirm({
    title: '全エントリーをリセット',
    message: 'すべての作品のエントリーを削除します。<br>この操作は取り消せません。よろしいですか？',
    okLabel: 'リセットする',
    onConfirm: () => fbSet('entries', null),
  });
}

// ── 再募集 ───────────────────────────────────────────────
function askRerunWork(id) {
  const w     = getWorks().find(x => x.id === id);
  if (!w) return;
  const title = getInfo(w).title;
  const count = (fbState.entries[id] || []).length;
  openConfirm({
    title: '再募集の確認',
    message: `<strong>${esc(title)}</strong> を再募集します。<br>現在のエントリー（<strong>${count}名</strong>）は開催履歴として保存され、エントリーはリセットされます。<br>よろしいですか？`,
    okLabel: '再募集する', danger: false,
    onConfirm: () => rerunWork(id),
  });
}

function rerunWork(id) {
  const entries = fbState.entries[id] || [];
  const info    = getInfo(getWorks().find(x => x.id === id));
  // 開催履歴として保存
  const histRef = db.ref(`mm/history/${id}`);
  histRef.once('value').then(snap => {
    const prev = snap.val() ? (Array.isArray(snap.val()) ? snap.val() : Object.values(snap.val())) : [];
    prev.push({ savedAt: Date.now(), scheduledAt: info.scheduledAt, venue: info.venue, entries });
    histRef.set(prev);
  });
  // エントリーリセット・ステータスを募集中に戻す
  fbSet(`entries/${id}`, null);
  saveInfo(id, { ...info, status: 'recruiting', scheduledAt: '', venue: '' });
}

// ── 作品削除 ─────────────────────────────────────────────
function askDeleteWork(id) {
  const w     = getWorks().find(x => x.id === id);
  if (!w) return;
  const title = getInfo(w).title;
  const count = (fbState.entries[id] || []).length;
  const extra = count > 0 ? `<br>エントリー済みの <strong>${count}名</strong> の情報も一緒に削除されます。` : '';
  openConfirm({
    title: '作品を削除',
    message: `<strong>${esc(title)}</strong> を一覧から削除します。${extra}<br>この操作は取り消せません。よろしいですか？`,
    okLabel: '削除する', onConfirm: () => deleteWork(id),
  });
}

function deleteWork(id) {
  const wi = { ...fbState.workinfo }; delete wi[id];
  const wc = { ...fbState.workcats }; delete wc[id];
  fbSet(`entries/${id}`, null);
  fbSet('workinfo', Object.keys(wi).length ? wi : null);
  fbSet('workcats', Object.keys(wc).length ? wc : null);
  if (isCustomWork({ id })) {
    // カスタム作品は Firebase から完全削除
    fbSet(`customWorks/${id}`, null);
  } else {
    // デフォルト作品は削除済みリストに追加
    const del = [...getDeleted()]; if (!del.includes(id)) del.push(id);
    fbSet('deleted', del);
  }
}

// ── 新規作品追加 ──────────────────────────────────────────
function addNewWork() {
  const title    = document.getElementById('new-title').value.trim();
  const author   = document.getElementById('new-author').value.trim();
  const price    = document.getElementById('new-price').value.trim();
  const players  = document.getElementById('new-players').value.trim();
  const time     = document.getElementById('new-time').value.trim();
  const tags     = document.getElementById('new-tags').value.split(',').map(t => t.trim()).filter(Boolean);
  const capacity = Math.max(0, parseInt(document.getElementById('new-capacity').value, 10) || 0);
  const cat      = document.getElementById('new-cat').value;
  const msgEl    = document.getElementById('msg-new-work');

  if (!title) { showMsg(msgEl, '作品名は必須です', 'err'); return; }

  const id = 'cw_' + Date.now();
  const newWork = { title, author, price, players, time, tags, capacity, defaultCat: cat };

  fbSet(`customWorks/${id}`, newWork).then(() => {
    // フォームをリセット
    ['new-title','new-author','new-price','new-players','new-time','new-tags'].forEach(k => document.getElementById(k).value = '');
    document.getElementById('new-capacity').value = '0';
    showMsg(msgEl, `「${title}」を追加しました`, 'ok');
  });
}

// ── ドラッグ&ドロップ並び替え ────────────────────────────
let adminDragSrcId = null;

function onAdminDragStart(e, id) {
  adminDragSrcId = id;
  e.dataTransfer.effectAllowed = 'move';
  setTimeout(() => e.currentTarget.classList.add('dragging'), 0);
}

function onAdminDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  const row = e.currentTarget;
  if (row.dataset.id !== adminDragSrcId) row.classList.add('drag-over');
}

function onAdminDragLeave(e) {
  e.currentTarget.classList.remove('drag-over');
}

function onAdminDragEnd(e) {
  e.currentTarget.draggable = false;
  document.querySelectorAll('#adminView .admin-card').forEach(el => {
    el.classList.remove('dragging', 'drag-over');
    el.draggable = false;
  });
}

function onAdminDrop(e, targetId) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if (!adminDragSrcId || adminDragSrcId === targetId) return;

  const works = getWorks();
  const ids   = works.map(w => w.id);
  const from  = ids.indexOf(adminDragSrcId);
  const to    = ids.indexOf(targetId);
  if (from === -1 || to === -1) return;

  ids.splice(from, 1);
  ids.splice(to, 0, adminDragSrcId);
  fbSet('workOrder', ids);
}

// ── utils ─────────────────────────────────────────────────
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

document.getElementById('headerPass').textContent = ADMIN_PASS;
